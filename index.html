<style>

            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
        }

        .bg-animate {

<body class="bg-animate min-h-screen flex items-center justify-center p-2 sm:p-4">

<div class="max-w-6xl w-full glass rounded-[2rem] shadow-2xl overflow-hidden border border-white/20">
        <div class="main-container flex flex-col md:grid h-full">
            
            <div class="bg-slate-900 p-8 text-white flex flex-col justify-center border-b md:border-b-0 md:border-r border-slate-700">
                <div class="mb-8">
                    <h1 class="text-3xl font-extrabold mb-2">Descomplic<span class="text-blue-400">AI</span></h1>
                    <p class="text-slate-400 text-sm">Contratos, Currículos e Documentos descomplicados em segundos.</p>
                </div>

                <div class="space-y-6">
                    <div class="group relative border-2 border-dashed border-slate-700 rounded-2xl p-6 transition-all hover:border-blue-500 bg-slate-800/50">
                        <input type="file" id="pdfFile" accept="application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <div class="text-center">
                            <span class="text-4xl mb-2 block">📄</span>
                            <p id="fileName" class="text-xs text-slate-400 truncate">Arraste seu PDF ou clique aqui</p>
                        </div>
                    </div>

                    <button onclick="enviarParaIA()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg btn-glow transition-all active:scale-95 flex items-center justify-center gap-2">
                        <span>Analisar Agora</span>
                    </button>
                </div>
            </div>

            <div class="p-8 bg-white/50 relative min-h-[400px]">
                <div id="loading" class="hidden absolute inset-0 bg-white/90 z-10 flex flex-col items-center justify-center rounded-r-[2rem]">
                    <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="text-blue-900 font-bold animate-pulse">Descomplicando documento em segundos...</p>
                </div>

                <div id="placeholder" class="h-full flex flex-col items-center justify-center text-slate-400 opacity-50 text-center">
                    <span class="text-6xl mb-4">⚖️</span>
                    <p class="max-w-xs text-lg">Aguardando seu arquivo para iniciar a mágica.</p>
                </div>

                <div id="resultado" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // Variável global para guardar os dados
        let dadosUltimaAnalise = null;

        // Atualiza o nome do arquivo selecionado
        document.getElementById('pdfFile').onchange = function() {
            if (this.files[0]) {
                document.getElementById('fileName').innerText = this.files[0].name;
                document.getElementById('fileName').classList.remove('text-slate-400');
                document.getElementById('fileName').classList.add('text-blue-400', 'font-bold');
            }
        };

        async function enviarParaIA() {
            const fileInput = document.getElementById('pdfFile');
            if (!fileInput.files[0]) return alert("Selecione um PDF primeiro!");

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('resultado').classList.add('hidden');

            try {
                // VERIFIQUE SE O SEU PYTHON ESTÁ NA PORTA 8001 OU 8000
                const response = await fetch('https://descomplicai-caw6.onrender.com/analisar', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.status === "sucesso") {
                    exibirResultado(result.dados);
                } else {
                    alert("Erro: " + result.mensagem);
                }
            } catch (error) {
                console.error(error);
                alert(async function enviarParaIA() {
    // ... (restante do código anterior)

    try {
        // MUDE ESTA LINHA ABAIXO PARA O LINK DO RENDER:
        const response = await fetch('https://descomplicai-caw6.onrender.com/analisar', {
            method: 'POST',
            body: formData
        });
        
        // ... (resto do seu código)
    } catch (error) {
        console.error(error);
        alert('Erro de conexão! O servidor pode estar "acordando". Tente novamente em 30 segundos.');
    }
});
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

       function exibirResultado(dados) {
    dadosUltimaAnalise = dados; 
    document.getElementById('resultado').classList.remove('hidden');
    document.getElementById('resumo').innerText = dados.resumo_curto;
    document.getElementById('veredito').innerText = dados.veredito;

    // 1. Renderiza Pontos de Atenção (Vermelho)
    const perigosDiv = document.getElementById('perigos');
    perigosDiv.innerHTML = dados.pontos_perigosos.map(p => `
        <div class="bg-red-50 border-l-4 border-red-500 p-3 rounded-r-xl">
            <p class="text-sm font-bold text-red-900">${p.clausula}</p>
            <p class="text-xs text-red-700 mt-1">${p.explicacao}</p>
        </div>
    `).join('');

    // 2. Cria/Atualiza a seção de Próximos Passos (Verde/Esmeralda)
    let acoesDiv = document.getElementById('acoesSugeridas');
    if (!acoesDiv) {
        acoesDiv = document.createElement('div');
        acoesDiv.id = 'acoesSugeridas';
        acoesDiv.className = "mt-6 space-y-4";
        document.getElementById('resultado').insertBefore(acoesDiv, document.getElementById('veredito').parentNode);
    }

    acoesDiv.innerHTML = `
        <h3 class="text-slate-900 font-bold text-lg mb-2 flex items-center gap-2">
            <span class="text-emerald-500">✔</span> Plano de Ação:
        </h3>
        <div class="grid gap-3">
            ${dados.proximos_passos.map(passo => `
                <div class="bg-emerald-50 border-l-4 border-emerald-500 p-3 rounded-r-xl">
                    <p class="text-sm font-bold text-emerald-900">Procurar: ${passo.quem}</p>
                    <p class="text-xs text-emerald-700 mt-1">${passo.como}</p>
                </div>
            `).join('')}
        </div>
    `;

    // 3. Botão de Download e Card de Risco
    if (!document.getElementById('btnDownload')) {
        const btn = document.createElement('button');
        btn.id = 'btnDownload';
        btn.className = "w-full mt-6 bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-black transition-all flex items-center justify-center gap-2";
        btn.innerHTML = `<span>Baixar Relatório Completo</span> 📥`;
        btn.onclick = gerarPDF;
        document.getElementById('resultado').appendChild(btn);
    }

    const card = document.getElementById('cardRisco');
    const cores = { 'Baixo': 'bg-emerald-500', 'Médio': 'bg-orange-500', 'Alto': 'bg-rose-600' };
    card.className = `inline-block px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest text-white shadow-sm ${cores[dados.nivel_risco] || 'bg-gray-500'}`;
    card.innerText = `Risco ${dados.nivel_risco}`;
}

        async function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const d = dadosUltimaAnalise;

            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("DescomplicAI - Relatório", 20, 20);
            
            doc.setFontSize(10);
            doc.text(`Data: ${new Date().toLocaleDateString()} | Risco: ${d.nivel_risco}`, 20, 30);
            doc.line(20, 35, 190, 35);

            doc.setFontSize(12);
            doc.text("Resumo:", 20, 45);
            doc.setFont("helvetica", "normal");
            const splitResumo = doc.splitTextToSize(d.resumo_curto, 170);
            doc.text(splitResumo, 20, 55);

            let y = 80;
            doc.setFont("helvetica", "bold");
            doc.text("Pontos Críticos:", 20, y);
            y += 10;

            d.pontos_perigosos.forEach((p, i) => {
                if(y > 270) { doc.addPage(); y = 20; }
                doc.setFontSize(10);
                doc.text(`${i+1}. ${p.clausula}`, 20, y);
                y += 7;
                const desc = doc.splitTextToSize(p.explicacao, 160);
                doc.text(desc, 25, y);
                y += (desc.length * 5) + 5;
            });

            doc.save("Analise_DescomplicAI.pdf");
        }
    </script>
</body>
</html>
